name: Sync Wiki

on:
  push:
    branches: [main]
    paths:
      - docs/wiki/**
      - .github/workflows/wiki-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docs/wiki to GitHub Wiki
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: docs/wiki/
