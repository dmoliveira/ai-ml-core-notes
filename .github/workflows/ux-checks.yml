name: UX Checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ux-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install docs + UX dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pip install playwright
          python -m playwright install chromium

      - name: UX script unit tests
        run: pytest tools/ux/test_live_pages_check.py tools/ux/test_render_live_dashboard.py

      - name: Build docs
        run: mkdocs build --strict

      - name: JS syntax check
        run: node --check docs/assets/quiz-web.js

      - name: Playwright route smoke
        env:
          PLAYWRIGHT_CMD: python -m playwright
        run: node tools/ux/playwright_smoke.mjs "file://${{ github.workspace }}/site/"

      - name: Playwright interaction e2e
        run: python tools/ux/quiz_interaction_e2e.py

  pages-live-smoke:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ux-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for GitHub Pages propagation
        run: sleep 40

      - name: Live pages smoke check
        run: python tools/ux/live_pages_check.py --json-out live-pages-latest.json

      - name: Render live dashboard markdown artifact
        run: python tools/ux/render_live_dashboard.py live-pages-latest.json live-pages-dashboard.md

      - name: Upload live check artifacts
        uses: actions/upload-artifact@v4
        with:
          name: live-pages-check
          path: |
            live-pages-latest.json
            live-pages-dashboard.md
